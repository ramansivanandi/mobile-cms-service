# R2DBC Pool Settings
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=2
spring.r2dbc.pool.max-size=10
spring.r2dbc.pool.max-idle-time=30m
spring.r2dbc.pool.validation-query=SELECT 1

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.r2dbc=DEBUG
logging.level.io.r2dbc.postgresql.QUERY=DEBUG
logging.level.reactor.netty.http.server.HttpServerOperations=ERROR

logging.level.io.r2dbc.pool=DEBUG
logging.level.org.springframework.r2dbc=DEBUG
# SpringDoc OpenAPI (Swagger)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Image Storage --------------------------------------------------------
# Directory where uploaded images are stored (outside the web root, never served directly)
 app.images.upload-dir=/Users/ramansivanandi/Documents/docs/upload/dynamicui/images

# app.images.upload-dir=/home/ubuntu/docs/upload/dynamicui/images
# Base URL used to build the imageUrl field in responses
app.images.base-url=http://localhost:8081/api/builder/images

# WebFlux multipart limits (must be >= max image size accepted in ImageService)
spring.codec.max-in-memory-size=11MB
spring.webflux.multipart.max-file-size=10MB
spring.webflux.multipart.max-request-size=10MB
