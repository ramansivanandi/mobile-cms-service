version: '3.8'

services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe-db
    environment:
      - ORACLE_PASSWORD=OraclePwd123
      - ORACLE_DATABASE=ORCL
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -s sys/OraclePwd123@localhost:1521/ORCL as sysdba <<< 'SELECT 1 FROM DUAL;' | grep -q '1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - dynamic-ui-network

volumes:
  oracle-data:

networks:
  dynamic-ui-network:
    driver: bridge

